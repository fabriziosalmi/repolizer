                    arrow.style.transform = isHidden ? 'rotate(180deg)' : '';
                });
                
                container.appendChild(section);
            });
        }

        function populateSuggestions() {
            const container = document.getElementById('suggestions');
            container.innerHTML = '';

            Object.entries(reportData.suggerimenti).forEach(([categoria, suggerimenti]) => {
                const categorySection = document.createElement('div');
                categorySection.className = 'mb-6';
                categorySection.innerHTML = `<h4 class="text-lg font-semibold mb-4">${categoria.replace('_', ' ').toUpperCase()}</h4>`;
                
                const suggestionsContainer = document.createElement('div');
                suggestionsContainer.className = 'space-y-3';
                
                suggerimenti.forEach(suggerimento => {
                    const item = document.createElement('div');
                    item.className = 'p-4 border-l-4 border-indigo-500 bg-indigo-50 rounded-r-lg';
                    item.innerHTML = `<p class="text-gray-700">${suggerimento}</p>`;
                    suggestionsContainer.appendChild(item);
                });
                
                categorySection.appendChild(suggestionsContainer);
                container.appendChild(categorySection);
            });
        }

        function getParameterIcon(tipo) {
            const icons = {
                'performance': '<svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
                'security': '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>',
                'code_quality': '<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>',
                'default': '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>'
            };
            return icons[tipo] || icons.default;
        }

        function getScoreClass(punteggio) {
            if (punteggio >= 7) return 'bg-green-100 text-green-800';
            if (punteggio >= 4) return 'bg-yellow-100 text-yellow-800';
            if (punteggio > 0) return 'bg-red-100 text-red-800';
            return 'bg-gray-100 text-gray-400'; // Score 0 = Not analyzed/unavailable
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            populateCategoryDetails();
            populateSuggestions();
            tippy('[data-tippy-content]', {
                theme: 'light',
                placement: 'top',
                arrow: true
            });
        });
    </script>
</body>
</html>
