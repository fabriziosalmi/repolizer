<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repolizer</title> <!-- Updated Title -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://unpkg.com/@popperjs/core@2" defer></script>
    <script src="https://unpkg.com/tippy.js@6" defer></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .metric-card { transition: all 0.3s ease; }
        .metric-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .chart-container {
            position: relative;
            margin: auto;
            height: 300px; /* Default height */
            width: 100%;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .category-chart-container { /* Specific container for potentially taller bar chart */
             height: 350px;
        }
        .categories-title-fixed {
            font-size: 1.2rem;
        }
        .category-content.hidden { display: none; }

        /* Score color classes */
        .score-high { color: #16a34a; } /* text-green-600 */
        .score-medium { color: #eab308; } /* text-yellow-500 */
        .score-low { color: #dc2626; } /* text-red-600 */

        /* Progress bar color classes */
        .progress-high { background-color: #16a34a; } /* bg-green-600 */
        .progress-medium { background-color: #eab308; } /* bg-yellow-500 */
        .progress-low { background-color: #dc2626; } /* bg-red-600 */

        /* Ensure tooltips are above other elements if needed */
        .tippy-box { z-index: 9999; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Header -->
        <header class="text-center mb-16 fade-in">
            <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl md:text-6xl mb-4">Repolizer Arena</h1>
        </header>

        <!-- Top 100 Rankings Section -->
        <div id="rankingsSection" class="mb-12"> <!-- Added ID for clarity -->
            <div id="rankings" class="space-y-8">
                <div class="fade-in">
                    <h2 class="text-3xl font-semibold mb-6 text-center">Classifiche</h2>
                </div>

                <!-- Overall Score Ranking -->
                <div class="bg-white rounded-2xl shadow-lg p-4 sm:p-8 fade-in">
                    <h3 class="text-xl sm:text-2xl font-semibold mb-4">Top 100</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead>
                                <tr>
                                    <th scope="col" class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Posizione</th>
                                    <th scope="col" class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Repository</th>
                                    <th scope="col" class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Punteggio</th>
                                    <th scope="col" class="px-3 sm:px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Report</th>
                                </tr>
                            </thead>
                            <tbody id="overallRanking" class="bg-white divide-y divide-gray-200">
                                <!-- Overall ranking data will be populated here by JS -->
                                <tr><td colspan="4" class="text-center py-8 text-gray-500">Caricamento classifiche...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Category Rankings -->
                <div id="categoryRankings" class="space-y-8">
                    <!-- Category ranking tables will be dynamically added here by JS -->
                </div>
            </div>
            <br>
        </div> <!-- End Rankings Section -->

    </div> <!-- Closing main max-w-7xl container -->

    <script>
        // Global variables
        let allReports = [];
        let currentReportData = null; // Keep track of the currently displayed report data
        let radarChartInstance = null; // To destroy previous charts
        let categoryChartInstance = null; // To destroy previous charts

        // --- Helper to destroy charts ---
        function destroyCharts() {
            if (radarChartInstance) {
                radarChartInstance.destroy();
                radarChartInstance = null;
            }
            if (categoryChartInstance) {
                categoryChartInstance.destroy();
                categoryChartInstance = null;
            }
        }

        // Modify the loadLatestReports function to store the source filename 
        async function loadLatestReports() {
            try {
                const response = await fetch('/latest_reports');
                if (!response.ok) {
                     throw new Error(`HTTP error! status: ${response.status}`);
                }
                const reports = await response.json();

                // Reset allReports array
                allReports = [];
                console.log(`Found ${reports.length} reports`);

                if (reports.length === 0) {
                    // Display message within the existing ranking table
                    const overallRankingTable = document.getElementById('overallRanking');
                     if (overallRankingTable) {
                        overallRankingTable.innerHTML = `
                            <tr><td colspan="4" class="px-6 py-12 text-center text-gray-500 italic">
                                Nessun report .json trovato nella directory 'reports'.
                            </td></tr>`;
                    }
                     // Hide detail view if no reports
                    const detailView = document.getElementById('reportDetailView');
                    if (detailView) detailView.classList.add('hidden');
                    return;
                }

                // Process each report
                for (const reportInfo of reports) {
                    // Ensure we only fetch JSON files
                     if (!reportInfo.filename || !reportInfo.filename.endsWith('.json')) {
                        console.warn(`Skipping non-JSON file: ${reportInfo.filename}`);
                        continue;
                     }
                    try {
                        const reportResponse = await fetch(reportInfo.filename);
                         if (!reportResponse.ok) {
                             throw new Error(`HTTP error loading report ${reportInfo.filename}! status: ${reportResponse.status}`);
                        }
                        const reportData = await reportResponse.json();

                        // Store the source filename with the report data
                        reportData._sourceFilename = reportInfo.filename;

                        // Ensure punteggio_totale exists (robust check)
                        if (typeof reportData.punteggio_totale !== 'number' && reportData.punteggi) {
                            const scores = Object.values(reportData.punteggi).filter(score => typeof score === 'number'); // Filter out non-numeric scores
                            if (scores.length > 0) {
                                const sum = scores.reduce((a, b) => a + b, 0);
                                reportData.punteggio_totale = +(sum / scores.length).toFixed(2);
                            } else {
                                reportData.punteggio_totale = 0;
                            }
                        } else if (typeof reportData.punteggio_totale !== 'number') {
                            // Handle cases where punteggi might also be missing or invalid
                            reportData.punteggio_totale = 0;
                        }

                         // Basic validation for core properties
                        if (!reportData.nome_repository || !reportData.url || !reportData.data_analisi || !reportData.dettagli) {
                            console.warn(`Report ${reportInfo.filename} is missing essential data. Skipping.`);
                            continue; // Skip incomplete reports
                        }

                        // Store the report data for later use
                        allReports.push(reportData);
                    } catch (error) {
                        console.error(`Error loading or parsing report ${reportInfo.filename}:`, error);
                    }
                }

                // Filter out any reports that might still be null if skipped above
                 allReports = allReports.filter(report => report !== null);

                 if (allReports.length === 0) {
                    const overallRankingTable = document.getElementById('overallRanking');
                     if (overallRankingTable) {
                        overallRankingTable.innerHTML = `
                            <tr><td colspan="4" class="px-6 py-12 text-center text-gray-500 italic">
                                Nessun report valido trovato o caricato. Controlla la console per errori.
                            </td></tr>`;
                    }
                     // Hide detail view if no reports
                    const detailView = document.getElementById('reportDetailView');
                    if (detailView) detailView.classList.add('hidden');
                     return;
                }

                // After loading all reports, populate rankings
                populateRankings();
                populateCategoryRankings();

                // Get the detail view container
                const detailView = document.getElementById('reportDetailView');

                // If we have reports, show the first one AND make the section visible
                if (allReports.length > 0 && detailView) {
                    detailView.classList.remove('hidden'); // <-- Make detail view visible
                    populatePage(allReports[0]); // Now populate it
                } else if (detailView) {
                    detailView.classList.add('hidden'); // Keep it hidden if no reports
                }

            } catch (error) {
                console.error('Error fetching report list:', error);
                 const overallRankingTable = document.getElementById('overallRanking');
                 if (overallRankingTable) {
                    overallRankingTable.innerHTML = `
                        <tr><td colspan="4" class="px-6 py-12 text-center text-red-500 italic">
                            Errore nel caricamento della lista dei report. Controlla la console.
                        </td></tr>`;
                }
            }
        }

        function populatePage(reportData) {
            if (!reportData) {
                console.error("populatePage called with invalid reportData");
                return;
            }
            currentReportData = reportData; // Store the data for the download button
            destroyCharts(); // Destroy old charts before creating new ones

            // Make sure the detail view is visible
            const detailView = document.getElementById('reportDetailView');
            if (!detailView) return; // Cannot proceed if detail view is missing
            detailView.classList.remove('hidden');

            // --- Safely update elements ---
            const safelyUpdateElement = (id, property, value) => {
                const element = document.getElementById(id);
                if (element) {
                    element[property] = value;
                } else {
                    console.warn(`Element with ID '${id}' not found for updating.`);
                }
            };

            safelyUpdateElement('repo-name', 'textContent', reportData.nome_repository || 'N/A');
            safelyUpdateElement('repo-url', 'href', reportData.url || '#');
            safelyUpdateElement('repo-url', 'textContent', reportData.url || 'N/A');
            safelyUpdateElement('data-analisi', 'textContent', `Report generato il ${reportData.data_analisi || 'N/A'}`);

            // Set the total score
            const punteggioTotale = typeof reportData.punteggio_totale === 'number' ? reportData.punteggio_totale : 0;
            safelyUpdateElement('punteggio-totale', 'textContent', punteggioTotale.toFixed(2));

            // Calculate and set progress bar width
            const punteggioTotalePercentuale = (punteggioTotale / 10) * 100;
            const scoreBar = document.getElementById('score-progress-bar');
            if (scoreBar) {
                scoreBar.style.width = `${Math.max(0, Math.min(100, punteggioTotalePercentuale))}%`; // Clamp between 0 and 100
            }

            // Set score colors
            const scoreElement = document.getElementById('total-score');
            if (scoreElement && scoreBar) {
                // Remove previous color classes
                scoreElement.classList.remove('score-high', 'score-medium', 'score-low');
                scoreBar.classList.remove('progress-high', 'progress-medium', 'progress-low');
                setTotalScoreColors(punteggioTotale, scoreElement, scoreBar); // Pass elements
            }

            // Initialize charts
            initCharts(reportData);

            // Populate category details
            populateCategoryDetails(reportData);

            // Handle download JSON button click for the DETAILED VIEW section.
            const detailDownloadButton = detailView.querySelector('button[aria-label="Scarica il report in formato JSON"]');
            if (detailDownloadButton) {
                // Clone and replace to remove old listeners safely
                const newButton = detailDownloadButton.cloneNode(true);
                detailDownloadButton.parentNode.replaceChild(newButton, detailDownloadButton);

                newButton.onclick = () => {
                     if (currentReportData) {
                         downloadSpecificReport(JSON.stringify(currentReportData, null, 2), currentReportData.nome_repository);
                     } else {
                         console.error("No current report data available for download.");
                     }
                };
                
                // Add View HTML button next to the download button
                const htmlReportPath = getHtmlReportPath(reportData);
                const viewButton = document.createElement('a');
                viewButton.classList.add('detail-view-html-button'); // Add a specific class for identification
                viewButton.href = htmlReportPath;
                viewButton.target = '_blank';
                viewButton.rel = 'noopener noreferrer';
                viewButton.setAttribute('aria-label', `Visualizza il report HTML per ${reportData.nome_repository || 'repository'}`);
                viewButton.className = 'inline-flex ml-2 items-center px-3 py-2 border border-green-500 text-sm font-medium rounded-md text-green-600 bg-white hover:bg-green-600 hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors duration-200';
                viewButton.innerHTML = `
                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Visualizza HTML
                `;
                
                // Add the view button after the download button
                newButton.parentNode.appendChild(viewButton);
            } else {
                console.warn("Detail view download button not found.");
            }

            // Call updateViewButtons to handle special HTML paths
            setTimeout(() => {
                // Wait a tiny bit for the DOM to update
                document.querySelectorAll('.detail-view-html-button').forEach(btn => {
                    const href = btn.getAttribute('href');
                    if (href.includes('_*.html') || href.startsWith('reports/?repo=')) {
                        btn.addEventListener('click', function(event) {
                            event.preventDefault();
                            
                            // Show loading state
                            const originalText = btn.innerHTML;
                            btn.innerHTML = `
                                <svg class="animate-spin w-4 h-4 mr-1.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Caricamento...
                            `;
                            
                            findMatchingHtmlReport(href)
                                .then(matchedPath => {
                                    window.open(matchedPath, '_blank');
                                })
                                .catch(error => {
                                    console.error("Error finding HTML report:", error);
                                    alert("Could not find a matching HTML report");
                                })
                                .finally(() => {
                                    btn.innerHTML = originalText;
                                });
                        });
                    }
                });
            }, 100);
        }

        // Modified setTotalScoreColors to accept elements
        function setTotalScoreColors(score, scoreElement, scoreBar) {
            if (!scoreElement || !scoreBar) return; // Guard clause
            if (score >= 7) {
                scoreElement.classList.add('score-high');
                scoreBar.classList.add('progress-high');
            } else if (score >= 4) {
                scoreElement.classList.add('score-medium');
                scoreBar.classList.add('progress-medium');
            } else {
                scoreElement.classList.add('score-low');
                scoreBar.classList.add('progress-low');
            }
        }

        function initCharts(reportData) {
            Chart.defaults.font.family = '"Inter", sans-serif';
            Chart.defaults.color = '#4B5563'; // text-gray-600

             // Ensure canvas elements exist before getting context
            const radarCanvas = document.getElementById('radarChart');
            const categoryCanvas = document.getElementById('categoryChart');

            if (!radarCanvas || !categoryCanvas) {
                 console.error("Chart canvas element(s) not found!");
                 // Clear any potential leftover message/chart in parent container
                 if (radarCanvas && radarCanvas.parentNode) radarCanvas.parentNode.innerHTML = '<canvas id="radarChart"></canvas>';
                 if (categoryCanvas && categoryCanvas.parentNode) categoryCanvas.parentNode.innerHTML = '<canvas id="categoryChart"></canvas>';
                 // Try to get canvas again after resetting HTML (might help if DOM was manipulated badly)
                 const newRadarCanvas = document.getElementById('radarChart');
                 const newCategoryCanvas = document.getElementById('categoryChart');
                 if (!newRadarCanvas || !newCategoryCanvas) return; // Still not found, give up.
                 radarCanvas = newRadarCanvas;
                 categoryCanvas = newCategoryCanvas;
            }

            const ctxRadar = radarCanvas.getContext('2d');
            const ctxCategory = categoryCanvas.getContext('2d');

            // Prepare data for charts - check if punteggi exists
            const categoryData = reportData.punteggi || {};
            const categoryLabels = Object.keys(categoryData).map(label => {
                return label.replace(/_/g, ' ')
                    .split(' ')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ');
            });
            const scores = Object.values(categoryData).map(score => typeof score === 'number' ? score : 0); // Default non-numeric scores to 0

            const getBarColor = (score) => {
                if (score >= 7) return 'rgba(22, 163, 74, 0.8)';   // green-600
                if (score >= 4) return 'rgba(234, 179, 8, 0.8)';    // yellow-500
                return 'rgba(220, 38, 38, 0.8)';                    // red-600
            };
            const barColors = scores.map(getBarColor);

             // Destroy existing charts if they exist (redundant check, but safe)
            destroyCharts();

            // Init Radar Chart
             if (categoryLabels.length > 0) {
                radarChartInstance = new Chart(ctxRadar, {
                    type: 'radar',
                    data: {
                        labels: categoryLabels,
                        datasets: [{
                            label: 'Punteggio',
                            data: scores,
                            backgroundColor: 'rgba(99, 102, 241, 0.2)', // Indigo-500 with opacity
                            borderColor: 'rgba(99, 102, 241, 0.8)',    // Indigo-500
                            borderWidth: 2,
                            pointBackgroundColor: scores.map(score => getBarColor(score).replace('0.8', '1')),
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: 'rgba(99, 102, 241, 1)'
                        }]
                    },
                    options: {
                        maintainAspectRatio: false, // Allow chart to fill container height
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 10,
                                ticks: { stepSize: 2, backdropColor: 'transparent' },
                                pointLabels: { font: { size: 11 } },
                                grid: { color: 'rgba(229, 231, 235, 0.7)' }, // gray-200
                                angleLines: { color: 'rgba(229, 231, 235, 0.7)' } // gray-200
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.95)',
                                titleColor: '#1F2937', bodyColor: '#1F2937', // gray-800
                                borderColor: '#E5E7EB', borderWidth: 1, // gray-200
                                padding: 12, displayColors: false, // Only show point color itself
                                callbacks: { label: (context) => `Punteggio: ${context.raw.toFixed(2)}` }
                            }
                        },
                        elements: { line: { tension: 0.1 } }
                    }
                });
             } else {
                ctxRadar.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
                ctxRadar.textAlign = 'center';
                ctxRadar.fillStyle = '#6B7280'; // gray-500
                ctxRadar.fillText('Nessun dato per il grafico radar', radarCanvas.width / 2, radarCanvas.height / 2);
             }


            // Category Bar Chart
            if (categoryLabels.length > 0) {
                categoryChartInstance = new Chart(ctxCategory, {
                    type: 'bar',
                    data: {
                        labels: categoryLabels,
                        datasets: [{
                            label: 'Punteggio',
                            data: scores,
                            backgroundColor: barColors,
                            borderColor: barColors.map(color => color.replace('0.8', '1')),
                            borderWidth: 1,
                            borderRadius: 6,
                            maxBarThickness: 40 // Adjusted thickness
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        maintainAspectRatio: false, // Allow chart to fill container height
                        scales: {
                            x: {
                                beginAtZero: true, max: 10,
                                grid: { display: true, drawBorder: false, color: 'rgba(229, 231, 235, 0.7)' }, // gray-200
                                ticks: { stepSize: 2 }
                            },
                            y: { grid: { display: false, drawBorder: false } }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.95)',
                                titleColor: '#1F2937', bodyColor: '#1F2937', // gray-800
                                borderColor: '#E5E7EB', borderWidth: 1, // gray-200
                                padding: 12, displayColors: false,
                                callbacks: { label: (context) => `Punteggio: ${context.raw.toFixed(2)}` }
                            }
                        },
                        layout: { padding: { left: 10, right: 20, top: 10, bottom: 10 } }, // Added top/bottom padding
                        animation: { duration: 1000, easing: 'easeOutCubic' } // Adjusted animation
                    }
                });
            } else {
                 ctxCategory.clearRect(0, 0, categoryCanvas.width, categoryCanvas.height);
                 ctxCategory.textAlign = 'center';
                 ctxCategory.fillStyle = '#6B7280'; // gray-500
                 ctxCategory.fillText('Nessun dato per il grafico categorie', categoryCanvas.width / 2, categoryCanvas.height / 2);
             }
        }

        function populateCategoryDetails(reportData) {
            const container = document.getElementById('categoryDetails');
            const template = document.getElementById('categoryTemplate');

            if (!container || !template) {
                console.error("Category details container or template not found.");
                return;
            }
            container.innerHTML = ''; // Clear previous details

            const detailsData = reportData.dettagli || {};
             const suggestionsData = reportData.suggerimenti || {};

            if (Object.keys(detailsData).length === 0) {
                 container.innerHTML = '<p class="text-center py-8 text-gray-500 italic">Nessun dettaglio disponibile per questo report.</p>';
                 return;
            }


            Object.entries(detailsData).forEach(([categoria, dettagli]) => {
                 if (!dettagli || typeof dettagli !== 'object') return; // Skip invalid category data

                const categoryElement = template.content.cloneNode(true);
                const section = categoryElement.querySelector('.bg-white'); // Get the main div
                const categoryName = categoria.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()); // Capitalize

                 // Safely query elements within the cloned template fragment
                const categoryNameElement = section.querySelector('.category-name');
                const toggleButton = section.querySelector('.category-toggle-button');
                const content = section.querySelector('.category-content');
                const parametersList = section.querySelector('.parameters-list');
                const suggestionsList = section.querySelector('.suggestions-list');
                const arrow = section.querySelector('.category-arrow');

                 if (!categoryNameElement || !toggleButton || !content || !parametersList || !suggestionsList || !arrow) {
                    console.warn(`Template structure for category '${categoria}' seems incomplete. Skipping.`);
                    return;
                 }

                categoryNameElement.textContent = categoryName;
                toggleButton.setAttribute('aria-label', `Mostra/Nascondi dettagli per ${categoryName}`);
                const contentId = `category-content-${categoria.replace(/[^a-zA-Z0-9]/g, '-')}`; // Sanitize ID
                toggleButton.setAttribute('aria-controls', contentId);
                content.id = contentId; // Set unique ID for content

                // Populate parameters table
                parametersList.innerHTML = ''; // Clear template content if any
                Object.entries(dettagli).forEach(([nome, info]) => {
                     if (!info || typeof info !== 'object') return; // Skip invalid parameter info

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50';
                    const parameterName = nome.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()); // Capitalize
                    const parameterIcon = getParameterIcon(info.tipo || 'default');
                    const description = info.descrizione || 'Nessuna descrizione';
                    const tippyDescription = info.descrizione ? info.descrizione.replace(/"/g, '"') : 'Nessuna descrizione'; // Escape quotes for attribute

                    // Handle the score display
                    let scoreDisplay = 'N/A';
                     let scoreClass = 'bg-gray-100 text-gray-500'; // Default N/A style
                     if (typeof info.punteggio === 'number' && !info.score_is_na) {
                        const formattedScore = Number.isInteger(info.punteggio) ? info.punteggio : parseFloat(info.punteggio).toFixed(2);
                        scoreDisplay = `${formattedScore}`;
                         scoreClass = getScoreClass(info.punteggio); // Get color class based on actual score
                     }

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-normal text-sm font-medium text-gray-900"> <!-- Allow wrap -->
                            <div class="flex items-center gap-2" data-tippy-content="${tippyDescription}">
                                ${parameterIcon}
                                <span>${parameterName}</span>

                                    const originalIndex = allReports.findIndex(r => r.nome_repository === report.nome_repository && r.data_analisi === report.data_analisi);
                                    const htmlReportPath = getHtmlReportPath(report);
                                    
                                    return `
                                    <tr class="hover:bg-gray-50 cursor-pointer category-rank-row" data-report-index="${originalIndex >= 0 ? originalIndex : ''}"> <!-- Store original index -->
                                        <td class="px-4 py-3 whitespace-nowrap">
                                            <span class="inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                                ${index + 1}
                                            </span>
                                        </td>
                                        <td class="px-4 py-3 whitespace-normal text-sm font-medium text-gray-900 hover:text-indigo-600 break-words min-w-[150px]"> <!-- Allow wrap, min width -->
                                            ${report.nome_repository}
                                        </td>
                                        <td class="px-4 py-3 whitespace-nowrap text-right flex items-center justify-end gap-2">
                                            <span class="inline-flex items-center justify-center px-2.5 py-0.5 rounded-full text-xs font-medium ${scoreClass}" style="min-width: 50px;">
                                                ${score.toFixed(2)}
                                            </span>
                                            <a href="${htmlReportPath}" target="_blank" rel="noopener noreferrer" 
                                               class="view-btn" title="Visualizza report HTML"
                                               onclick="event.stopPropagation()">
                                                <svg class="w-4 h-4 text-green-600 hover:text-green-800" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                                </svg>
                                            </a>
                                        </td>
                                    </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                 // Add click listeners to rows in this category table
                 categorySection.querySelectorAll('.category-rank-row').forEach(row => {
                     row.addEventListener('click', () => {
                         const reportIndex = row.dataset.reportIndex;
                         if (reportIndex !== '' && allReports[reportIndex]) {
                            const detailView = document.getElementById('reportDetailView');
                            if (!detailView) return;
                            detailView.classList.remove('hidden');
                            populatePage(allReports[reportIndex]);
                            detailView.scrollIntoView({ behavior: 'smooth', block: 'start' });
                         } else {
                            console.warn("Could not find report for category ranking row.");
                         }
                     });
                 });


                categoryRankingsContainer.appendChild(categorySection);
            });

            // After populating all categories
            updateViewButtons();
        }

        // --- Download Function (accepts raw JSON string) ---
        function downloadSpecificReport(jsonDataString, repoName) {
             if (!jsonDataString || !repoName) {
                 console.error("Download function called with invalid data.");
                 return;
             }
            try {
                // Encode the JSON string for the Data URI
                const encodedData = encodeURIComponent(jsonDataString);
                const dataStr = "data:text/json;charset=utf-8," + encodedData;

                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);

                // Sanitize filename (replace potentially problematic characters)
                const safeRepoName = repoName.replace(/[\s\/\\?%*:|"<>]+/g, '_'); // Replace space and others with underscore
                const filename = `${safeRepoName}_report.json`;
                downloadAnchorNode.setAttribute("download", filename);

                // Append temporarily, click, and remove
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                document.body.removeChild(downloadAnchorNode);
            } catch (error) {
                console.error("Error during JSON download:", error);
                // Optionally, inform the user
                // alert("Si è verificato un errore durante il tentativo di download del report.");
            }
        }
        // Expose to global scope (optional, but can be useful for debugging)
        window.downloadSpecificReport = downloadSpecificReport;

        // --- Utility function for score color class (based on background/text pairing) ---
        function getScoreColorClass(score) {
             const scoreNum = Number(score); // Ensure it's a number
             if (isNaN(scoreNum) || score === null || score === undefined) {
                return 'bg-gray-100 text-gray-500';
             }
            if (scoreNum >= 7) return 'bg-green-100 text-green-800';
            if (scoreNum >= 4) return 'bg-yellow-100 text-yellow-800';
            return 'bg-red-100 text-red-800';
        }

        // Function to generate the HTML report path based on report data
        function getHtmlReportPath(report) {
            if (!report || !report.nome_repository) return '#';
            
            try {
                // First try to find the exact filename in our loaded data
                // Look for the JSON filename in our allReports array's source paths
                for (const loadedReport of allReports) {
                    // Find the matching report by repository name and date
                    if (loadedReport.nome_repository === report.nome_repository && 
                        loadedReport.data_analisi === report.data_analisi) {
                        
                        // If we have the original source filename, use it
                        if (loadedReport._sourceFilename && loadedReport._sourceFilename.endsWith('.json')) {
                            // Convert JSON path to HTML path
                            return loadedReport._sourceFilename.replace('.json', '.html');
                        }
                    }
                }
                
                // If we couldn't find a direct match, try to construct the filename from the data_analisi
                if (report.data_analisi) {
                    const formattedDate = formatDateForFilename(report.data_analisi);
                    if (formattedDate) {
                        return `reports/report_${formattedDate}.html`;
                    }
                }
                
                // If all else fails, use a special format that will be handled by our click handler
                return `reports/?repo=${encodeURIComponent(report.nome_repository)}`;
                
            } catch (error) {
                console.error("Error generating HTML report path:", error, report);
                return `reports/?repo=${encodeURIComponent(report.nome_repository)}`;
            }
        }
        
        // Helper function to format a date string for the filename
        function formatDateForFilename(dateStr) {
            try {
                // Extract date components from the string
                let match;
                let year, month, day, hour, minute, second;
                
                // Try YYYY-MM-DD HH:MM:SS format (like 2025-04-08 10:08:29)
                if (match = dateStr.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})/)) {
                    [, year, month, day, hour, minute, second] = match;
                } 
                // Try DD/MM/YYYY HH:MM:SS format
                else if (match = dateStr.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})/)) {
                    [, day, month, year, hour, minute, second] = match;
                }
                // If no format matches, return empty string
                else {
                    return '';
                }
                
                // Format as YYYYMMDD_HHMMSS
                return `${year}${month}${day}_${hour}${minute}${second}`;
            } catch (error) {
                console.error("Error formatting date for filename:", error, dateStr);
                return '';
            }
        }

        // Modified findMatchingHtmlReport function to handle the new format
        function findMatchingHtmlReport(wildcardPath) {
            return new Promise((resolve, reject) => {
                // Extract repo name from the path
                let repoName = null;
                
                if (wildcardPath.startsWith('reports/?repo=')) {
                    const params = new URLSearchParams(wildcardPath.substring(wildcardPath.indexOf('?')));
                    repoName = params.get('repo');
                }
                
                if (!repoName) {
                    reject("Invalid repository path");
                    return;
                }
                
                // First check if we have an exact match in our loaded reports
                for (const report of allReports) {
                    if (report && report.nome_repository === repoName) {
                        // Check if we have the source filename
                        if (report._sourceFilename && report._sourceFilename.endsWith('.json')) {
                            const htmlPath = report._sourceFilename.replace('.json', '.html');
                            
                            // Check if this HTML file exists
                            fetch(htmlPath, { method: 'HEAD' })
                                .then(response => {
                                    if (response.ok) {
                                        resolve(htmlPath);
                                    } else {
                                        throw new Error("HTML file not found");
                                    }
                                })
                                .catch(() => {
                                    requestReportsList(repoName).then(resolve).catch(reject);
                                });
                            return;
                        }
                        
                        // Try using the formatted date
                        if (report.data_analisi) {
                            const formattedDate = formatDateForFilename(report.data_analisi);
                            if (formattedDate) {
                                const htmlPath = `reports/report_${formattedDate}.html`;
                                
                                // Check if this file exists
                                fetch(htmlPath, { method: 'HEAD' })
                                    .then(response => {
                                        if (response.ok) {
                                            resolve(htmlPath); 
                                        } else {
                                            throw new Error("HTML file not found");
                                        }
                                    })
                                    .catch(() => {
                                        requestReportsList(repoName).then(resolve).catch(reject);
                                    });
                                return;
                            }
                        }
                    }
                }
                
                // If we didn't find a match in loaded reports, request the list
                requestReportsList(repoName).then(resolve).catch(reject);
            });
        }
        
        // Function to request the list of reports and find the best match
        function requestReportsList(repoName) {
            return new Promise((resolve, reject) => {
                fetch('/latest_reports')
                    .then(response => response.json())
                    .then(reports => {
                        // Filter for HTML reports
                        const htmlReports = reports.filter(r => 
                            r.filename && r.filename.endsWith('.html')
                        ).map(r => r.filename);
                        
                        console.log(`Searching for HTML report for repo ${repoName}`);
                        console.log("Available HTML reports:", htmlReports);
                        
                        if (htmlReports.length > 0) {
                            // Try to find a matching report
                            const findPromises = htmlReports.map(htmlPath => {
                                const jsonPath = htmlPath.replace('.html', '.json');
                                return fetch(jsonPath)
                                    .then(response => response.json())
                                    .then(data => {
                                        return {
                                            path: htmlPath,
                                            match: data.nome_repository === repoName
                                        };
                                    })
                                    .catch(() => ({ path: htmlPath, match: false }));
                            });
                            
                            Promise.all(findPromises)
                                .then(results => {
                                    const match = results.find(r => r.match);
                                    if (match) {
                                        resolve(match.path);
                                    } else {
                                        // If no match, return the first report as a fallback
                                        resolve(htmlReports[0]);
                                    }
                                })
                                .catch(error => {
                                    console.error("Error checking JSON files:", error);
                                    // Return the first HTML report as a fallback
                                    resolve(htmlReports[0]);
                                });
                        } else {
                            reject("No HTML reports found");
                        }
                    })
                    .catch(error => {
                        console.error("Error fetching reports list:", error);
                        reject(error);
                    });
            });
        }

        // Update the view HTML button click handler for main rankings
        function updateViewButtons() {
            document.querySelectorAll('.view-html-button').forEach(btn => {
                const originalHref = btn.getAttribute('href');
                
                // Only modify special paths
                if (originalHref.includes('_*.html') || originalHref.startsWith('reports/?repo=')) {
                    btn.addEventListener('click', function(event) {
                        event.preventDefault();
                        event.stopPropagation();
                        
                        // Show loading state
                        const originalText = btn.innerHTML;
                        btn.innerHTML = `
                            <svg class="animate-spin w-4 h-4 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Loading...
                        `;
                        
                        // Try to find a matching HTML report
                        findMatchingHtmlReport(originalHref)
                            .then(matchedPath => {
                                console.log("Found matching report:", matchedPath);
                                window.open(matchedPath, '_blank');
                            })
                            .catch(error => {
                                console.error("Error finding HTML report:", error);
                                alert("Could not find a matching HTML report");
                            })
                            .finally(() => {
                                btn.innerHTML = originalText;
                            });
                    });
                }
            });
            
            // Also update view buttons in category rankings
            document.querySelectorAll('.view-btn').forEach(btn => {
                const originalHref = btn.getAttribute('href');
                
                if (originalHref.includes('_*.html') || originalHref.startsWith('reports/?repo=')) {
                    btn.addEventListener('click', function(event) {
                        event.preventDefault();
                        event.stopPropagation();
                        
                        // Show loading state with just the spinner for small buttons
                        const originalHTML = btn.innerHTML;
                        btn.innerHTML = `
                            <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        `;
                        
                        findMatchingHtmlReport(originalHref)
                            .then(matchedPath => {
                                window.open(matchedPath, '_blank');
                            })
                            .catch(error => {
                                console.error("Error finding HTML report:", error);
                                alert("Could not find a matching HTML report");
                            })
                            .finally(() => {
                                btn.innerHTML = originalHTML;
                            });
                    });
                }
            });
        }

        // --- DOMContentLoaded Listener ---
        document.addEventListener('DOMContentLoaded', () => {
            loadLatestReports(); // Load data and populate everything

            // Initial Tippy setup for static elements (like footer link) - delegate for dynamic ones
             tippy('body', {
                 target: '[data-tippy-content]:not(body)', // Target elements with the attribute, excluding body itself
                 theme: 'light',
                 placement: 'top',
                 arrow: true,
                 allowHTML: true, // Important if tooltips contain HTML (like icons)
                 // delay: [100, 0], // Optional: Slight delay on show, none on hide
                 // trigger: 'mouseenter focus', // Add focus for keyboard accessibility
             });
        });
    </script>
