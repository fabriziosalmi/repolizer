<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repolizer Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://unpkg.com/@popperjs/core@2" defer></script>
    <script src="https://unpkg.com/tippy.js@6" defer></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .metric-card { transition: all 0.3s ease; }
        .metric-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .chart-container {
            position: relative;
            margin: auto;
            height: 300px;
            width: 100%;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .categories-title-fixed {
            font-size: 1.2rem;
        }
        .category-content.hidden { display: none; } /* Ensure hidden class works */

        /* Score color classes */
        .score-high { color: #16a34a; } /* text-green-600 */
        .score-medium { color: #eab308; } /* text-yellow-500 */
        .score-low { color: #dc2626; } /* text-red-600 */

        /* Progress bar color classes */
        .progress-high { background-color: #16a34a; } /* bg-green-600 */
        .progress-medium { background-color: #eab308; } /* bg-yellow-500 */
        .progress-low { background-color: #dc2626; } /* bg-red-600 */
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Header -->
        <header class="text-center mb-16 fade-in">
            <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl md:text-6xl mb-4">repolizer/top10</h1>
        </header>

        <!-- Top 10 Rankings -->
        <div id="rankings" class="space-y-8">
            <div class="fade-in">
                <h2 class="text-3xl font-semibold mb-6 text-center">Classifiche</h2>
            </div>

            <!-- Overall Score Ranking -->
            <div class="bg-white rounded-2xl shadow-lg p-8 fade-in">
                <h3 class="text-2xl font-semibold mb-4">Top 10 - Punteggio Totale</h3>
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Posizione</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Repository</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Punteggio</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="overallRanking" class="bg-white divide-y divide-gray-200">
                        <!-- Overall ranking data will be populated here -->
                    </tbody>
                </table>
            </div>

            <!-- Category Rankings -->
            <div id="categoryRankings" class="space-y-8">
                <!-- Category ranking tables will be dynamically added here -->
            </div>
        </div>
        <br>

    </div>

    <script>
        // Global array to store all reports
        let allReports = [];

        async function loadLatestReports() {
            try {
                const response = await fetch('/latest_reports');
                const reports = await response.json();

                // Reset allReports array
                allReports = [];
                
                console.log(`Found ${reports.length} reports`);
                
                if (reports.length === 0) {
                    document.body.innerHTML = `
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                            <div class="text-center py-12">
                                <h1 class="text-3xl font-bold text-gray-900">No reports found</h1>
                                <p class="mt-4 text-lg text-gray-600">No repository reports were found in the reports directory.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                // Process each report
                for (const reportInfo of reports) {
                    try {
                        const reportResponse = await fetch(reportInfo.filename);
                        const reportData = await reportResponse.json();
                        
                        // Ensure punteggio_totale exists
                        if (!reportData.punteggio_totale && reportData.punteggi) {
                            // Calculate total score if not present
                            const scores = Object.values(reportData.punteggi);
                            if (scores.length > 0) {
                                const sum = scores.reduce((a, b) => a + b, 0);
                                reportData.punteggio_totale = +(sum / scores.length).toFixed(2);
                            } else {
                                reportData.punteggio_totale = 0;
                            }
                        }
                        
                        // Store the report data for later use
                        allReports.push(reportData);
                    } catch (error) {
                        console.error(`Error loading report ${reportInfo.filename}:`, error);
                    }
                }
                
                // After loading all reports, populate rankings
                populateRankings();
                populateCategoryRankings();
                
                // If we have reports, show the first one
                if (allReports.length > 0) {
                    populatePage(allReports[0]);
                }
                
            } catch (error) {
                console.error('Error fetching reports:', error);
            }
        }

        async function loadAndProcessReport(reportInfo) {
            try {
                const reportResponse = await fetch(reportInfo.filename);
                const reportData = await reportResponse.json();

                // Populate the page with the report data.
                populatePage(reportData); // Pass the report data to this function.

            } catch (error) {
                console.error(`Error loading or processing report for ${reportInfo.website}:`, error);
            }
        }

        function populatePage(reportData) {
            // Set header information
            document.getElementById('repo-name').textContent = reportData.nome_repository;
            document.getElementById('repo-url').href = reportData.url;
            document.getElementById('data-analisi').textContent = `Report generato il ${reportData.data_analisi}`;

            // Set the total score
            const punteggioTotale = reportData.punteggio_totale;
            document.getElementById('punteggio-totale').textContent = punteggioTotale;

            // Calculate the percentage for the progress bar
            const punteggioTotalePercentuale = (punteggioTotale / 10) * 100;
            const scoreBar = document.getElementById('score-progress-bar');
            scoreBar.style.width = `${punteggioTotalePercentuale}%`;

            // Set score colors
            setTotalScoreColors(punteggioTotale);

            // Initialize charts
            initCharts(reportData);

            // Populate category details
            populateCategoryDetails(reportData);

            // Populate rankings (example - you'll need to adapt this to your specific ranking data)
            //populateRankings(reportData); // Implement this based on where ranking info comes from.

            // Handle download JSON button click.
            document.querySelector('button[aria-label="Scarica il report in formato JSON"]').onclick = () => downloadJSON(reportData, reportData.nome_repository); // Pass data to the downloadJSON()
        }

        function setTotalScoreColors(score) {
            const scoreElement = document.getElementById('total-score');
            const scoreBar = document.getElementById('score-progress-bar');
            if (score >= 7) {
                scoreElement.classList.add('score-high');
                scoreBar.classList.add('progress-high');
            } else if (score >= 4) {
                scoreElement.classList.add('score-medium');
                scoreBar.classList.add('progress-medium');
            } else {
                scoreElement.classList.add('score-low');
                scoreBar.classList.add('progress-low');
            }
        }

        function initCharts(reportData) {
            Chart.defaults.font.family = '"Inter", sans-serif';
            Chart.defaults.color = '#4B5563';

            // Prepare data for charts
            const categoryLabels = Object.keys(reportData.punteggi).map(label => {
                return label.replace(/_/g, ' ')
                    .split(' ')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ');
            });
            const scores = Object.values(reportData.punteggi);

            const getBarColor = (score) => {
                if (score >= 7) return 'rgba(34, 197, 94, 0.8)';      // Green for good scores
                if (score >= 4) return 'rgba(234, 179, 8, 0.8)';       // Yellow for medium scores
                return 'rgba(239, 68, 68, 0.8)';                       // Red for low scores
            };

            const barColors = scores.map(getBarColor);

            // Init Radar Chart
            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            new Chart(ctxRadar, {
                type: 'radar',
                data: {
                    labels: categoryLabels,
                    datasets: [{
                        label: 'Punteggio',
                        data: scores,
                        backgroundColor: 'rgba(99, 102, 241, 0.2)', // Indigo with opacity
                        borderColor: 'rgba(99, 102, 241, 0.8)',
                        borderWidth: 2,
                        pointBackgroundColor: scores.map(score => getBarColor(score).replace('0.8', '1')),
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(99, 102, 241, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 10,
                            ticks: {
                                stepSize: 2,
                                backdropColor: 'transparent'
                            },
                            pointLabels: {
                                font: {
                                    size: 11
                                }
                            },
                            grid: {
                                color: 'rgba(226, 232, 240, 0.7)'
                            },
                            angleLines: {
                                color: 'rgba(226, 232, 240, 0.7)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#1F2937',
                            bodyColor: '#1F2937',
                            borderColor: '#E5E7EB',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: function (context) {
                                    return `Punteggio: ${context.raw.toFixed(2)}/10`;
                                }
                            }
                        }
                    },
                    elements: {
                        line: {
                            tension: 0.1
                        }
                    }
                }
            });

            // Category Bar Chart
            const ctxCategory = document.getElementById('categoryChart').getContext('2d');

            // Check if we have data to display
            if (categoryLabels.length > 0) {
                // Create vertical bar chart
                new Chart(ctxCategory, {
                    type: 'bar',
                    data: {
                        labels: categoryLabels,
                        datasets: [{
                            label: 'Punteggio',
                            data: scores,
                            backgroundColor: barColors,
                            borderColor: barColors.map(color => color.replace('0.8', '1')),
                            borderWidth: 1,
                            borderRadius: 6,
                            maxBarThickness: 60
                        }]
                    },
                    options: {
                        indexAxis: 'y',  // Makes bars horizontal
                        scales: {
                            x: {
                                beginAtZero: true,
                                max: 10,
                                grid: {
                                    display: true,
                                    drawBorder: false,
                                    color: 'rgba(226, 232, 240, 0.7)'
                                },
                                ticks: {
                                    stepSize: 2
                                }
                            },
                            y: {
                                grid: {
                                    display: false,
                                    drawBorder: false
                                }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                                titleColor: '#1F2937',
                                bodyColor: '#1F2937',
                                borderColor: '#E5E7EB',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                callbacks: {
                                    label: function (context) {
                                        return `Punteggio: ${context.raw.toFixed(2)}/10`;
                                    }
                                }
                            }
                        },
                        layout: {
                            padding: {
                                left: 10,
                                right: 20,
                                top: 0,
                                bottom: 0
                            }
                        },
                        animation: {
                            duration: 2000,
                            easing: 'easeOutQuart'
                        }
                    }
                });
            } else {
                console.warn('No category data available for chart');
                document.getElementById('categoryChart').parentNode.innerHTML =
                    '<div class="text-center text-gray-500">Nessun dato disponibile per il grafico</div>';
            }
        }

        function populateCategoryDetails(reportData) {
            const container = document.getElementById('categoryDetails');
            const template = document.getElementById('categoryTemplate');
            container.innerHTML = '';

            Object.entries(reportData.dettagli).forEach(([categoria, dettagli]) => {
                const categoryElement = template.content.cloneNode(true);
                const section = categoryElement.querySelector('.bg-white'); // Get the main div
                const categoryName = categoria.replace(/_/g, ' ').toUpperCase();

                // Set category name and button aria-label
                section.querySelector('.category-name').textContent = categoryName;
                const toggleButton = section.querySelector('.category-toggle-button');
                toggleButton.setAttribute('aria-label', `Mostra/Nascondi dettagli per ${categoryName}`);
                toggleButton.setAttribute('aria-controls', `category-content-${categoria}`); // Link button to content

                const content = section.querySelector('.category-content');
                content.id = `category-content-${categoria}`; // Set unique ID for content

                // Populate parameters table
                const parametersList = section.querySelector('.parameters-list');
                parametersList.innerHTML = ''; // Clear template content if any
                Object.entries(dettagli).forEach(([nome, info]) => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50';
                    const parameterName = nome.replace(/_/g, ' ').toUpperCase();
                    const parameterIcon = getParameterIcon(info.tipo || 'default');
                    const description = info.descrizione || 'Nessuna descrizione disponibile';

                    // Handle the score display
                    let scoreDisplay;
                    if (info.punteggio === null || info.punteggio === undefined || info.score_is_na) {
                        scoreDisplay = 'N/A';
                    } else {
                        // Format the score to have a maximum of 2 decimal places
                        const formattedScore = Number.isInteger(info.punteggio) ?
                            info.punteggio :
                            parseFloat(info.punteggio).toFixed(2);
                        scoreDisplay = `${formattedScore}/10`;
                    }

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            <div class="flex items-center gap-2" data-tippy-content="${description}">
                                ${parameterIcon}
                                <span>${parameterName}</span>
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="font-mono bg-gray-100 px-2 py-1 rounded">${info.valore !== null && info.valore !== undefined ? info.valore : 'N/A'}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${getScoreClass(info.punteggio)}">
                                ${scoreDisplay}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">${description}</td>
                    `;
                    parametersList.appendChild(row);
                });

                // Populate suggestions
                const suggestionsList = section.querySelector('.suggestions-list');
                suggestionsList.innerHTML = ''; // Clear template content
                const categorySuggestions = reportData.suggerimenti[categoria] || [];

                if (categorySuggestions.length > 0) {
                    categorySuggestions.forEach(suggestion => {
                        const li = document.createElement('li');
                        li.className = 'p-3 border-l-4 border-indigo-500 bg-indigo-50 rounded-r-lg';
                        li.innerHTML = `<p class="text-gray-700">${suggestion}</p>`;
                        suggestionsList.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.className = 'p-3 bg-gray-50 rounded-lg text-gray-500 italic';
                    li.textContent = 'Nessun suggerimento per questa categoria';
                    suggestionsList.appendChild(li);
                }

                // Add collapse functionality with default expanded state
                const arrow = section.querySelector('.category-arrow');
                toggleButton.addEventListener('click', () => {
                    const isHidden = content.classList.toggle('hidden');
                    arrow.style.transform = isHidden ? '' : 'rotate(180deg)'; // Rotate when shown
                    toggleButton.setAttribute('aria-expanded', !isHidden);
                });

                container.appendChild(section); // Append the whole section div
            });

            // Re-initialize Tippy for dynamically added elements
            tippy('[data-tippy-content]', {
                theme: 'light',
                placement: 'top',
                arrow: true
            });
        }

        function getParameterIcon(tipo) {
            const icons = {
                'performance': '<svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
                'security': '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>',
                'code_quality': '<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>',
                'default': '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>'
            };
            return icons[tipo] || icons.default;
        }

        function getScoreClass(punteggio) {
            // Handle null, undefined or N/A scores
            if (punteggio === null || punteggio === undefined) {
                return 'bg-gray-100 text-gray-500'; // Grey for N/A values
            }

            // Handle numeric scores
            if (punteggio >= 7) return 'bg-green-100 text-green-800';
            if (punteggio >= 4) return 'bg-yellow-100 text-yellow-800';
            return 'bg-red-100 text-red-800'; // Any score < 4, including 0
        }

        function populateRankings() {
            // Sort reports by overall score in descending order
            const sortedReports = [...allReports].sort((a, b) => 
                b.punteggio_totale - a.punteggio_totale
            );
            
            // Get top 10 (or fewer if there aren't 10 reports)
            const topReports = sortedReports.slice(0, 10);
            
            const overallRankingTable = document.getElementById('overallRanking');
            overallRankingTable.innerHTML = '';
            
            // Check if we have any reports
            if (topReports.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `
                    <td colspan="4" class="px-6 py-12 text-center text-gray-500 italic">
                        Nessun report disponibile per la classifica
                    </td>
                `;
                overallRankingTable.appendChild(emptyRow);
                return;
            }

            // Populate the ranking table
            topReports.forEach((report, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors duration-150';
                
                // Determine the style for the position badge based on rank
                let positionClass = 'bg-gray-100 text-gray-800';
                if (index === 0) positionClass = 'bg-yellow-100 text-yellow-800'; // Gold
                else if (index === 1) positionClass = 'bg-gray-200 text-gray-800'; // Silver
                else if (index === 2) positionClass = 'bg-amber-100 text-amber-800'; // Bronze
                
                // Add medal icon for top 3
                let medal = '';
                if (index === 0) medal = '<span class="text-yellow-500 ml-1">🏆</span>';
                else if (index === 1) medal = '<span class="text-gray-500 ml-1">🥈</span>';
                else if (index === 2) medal = '<span class="text-amber-500 ml-1">🥉</span>';
                
                // Get score class based on the score value
                const scoreClass = getScoreColorClass(report.punteggio_totale);
                
                // Create category score indicators with icons
                const categoryIcons = {
                    distribuzione: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>',
                    manutenzione: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>',
                    codice: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>',
                    documentazione: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>',
                    collaborazione: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>',
                    sicurezza: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>',
                    integrazione: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
                    adozione: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>'
                };
                
                const categoryScores = Object.entries(report.punteggi || {}).map(([category, score]) => {
                    const categoryClass = getScoreColorClass(score);
                    const icon = categoryIcons[category] || '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                    const categoryName = category.charAt(0).toUpperCase() + category.slice(1);
                    
                    return `
                        <div class="flex items-center gap-1 px-2 py-1 rounded ${categoryClass}" data-tippy-content="${categoryName}: ${score.toFixed(1)}/10">
                            ${icon}
                            <span class="text-xs font-medium">${score.toFixed(1)}</span>
                        </div>
                    `;
                }).join('');
                
                // Create download button for this report
                const reportData = encodeURIComponent(JSON.stringify(report, null, 2));
                const downloadButton = `
                    <button onclick="event.stopPropagation(); downloadSpecificReport('${reportData}', '${report.nome_repository}')" 
                            class="inline-flex items-center px-2 py-1 text-xs font-medium rounded border border-indigo-500 text-indigo-500 hover:bg-indigo-500 hover:text-white transition-colors duration-200">
                        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 12l-5-5 1.41-1.41L10 9.17l3.59-3.58L15 7l-5 5z"/>
                            <path d="M10 18a8 8 0 100-16 8 8 0 000 16zm0-2a6 6 0 100-12 6 6 0 000 12z"/>
                        </svg>
                        JSON
                    </button>
                `;
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center justify-center px-3 py-1 rounded-full text-sm font-medium ${positionClass}">
                            ${index + 1}${medal}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-8 w-8 flex items-center justify-center bg-indigo-100 rounded-full">
                                <svg class="h-5 w-5 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                                </svg>
                            </div>
                            <div class="ml-4">
                                <a href="${report.url}" target="_blank" class="text-sm font-medium text-gray-900 hover:text-indigo-600 transition-colors">
                                    ${report.nome_repository}
                                </a>
                                <div class="text-xs text-gray-500">Analizzato: ${report.data_analisi}</div>
                                <div class="mt-2 flex flex-wrap gap-1">
                                    ${categoryScores}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${scoreClass}">
                            ${report.punteggio_totale.toFixed(2)}/10
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        ${downloadButton}
                    </td>
                `;
                
                // Add click event to load this report details
                row.style.cursor = 'pointer';
                row.addEventListener('click', () => {
                    populatePage(report);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                
                overallRankingTable.appendChild(row);
            });
            
            // Initialize tooltips after populating the rankings
            tippy('[data-tippy-content]', {
                theme: 'light',
                placement: 'top',
                arrow: true
            });
        }
        
        function populateCategoryRankings() {
            // Get all unique categories from the reports
            const categories = new Set();
            allReports.forEach(report => {
                if (report.punteggi) {
                    Object.keys(report.punteggi).forEach(cat => categories.add(cat));
                }
            });
            
            // Map of category icons (reuse from above)
            const categoryIcons = {
                distribuzione: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>',
                manutenzione: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>',
                codice: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>',
                documentazione: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>',
                collaborazione: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>',
                sicurezza: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>',
                integrazione: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
                adozione: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>'
            };
            
            // Create ranking tables for each category
            const categoryRankingsContainer = document.getElementById('categoryRankings');
            categoryRankingsContainer.innerHTML = '';
            categoryRankingsContainer.classList.add('grid', 'grid-cols-1', 'md:grid-cols-2', 'gap-6');
            
            // Process each category
            categories.forEach(category => {
                // Sort reports by this category's score
                const sortedByCategory = [...allReports]
                    .filter(r => r.punteggi && r.punteggi[category] !== undefined)
                    .sort((a, b) => b.punteggi[category] - a.punteggi[category])
                    .slice(0, 10); // Top 10 for each category
                
                if (sortedByCategory.length === 0) return;
                
                // Create the category ranking table
                const categorySection = document.createElement('div');
                categorySection.className = 'bg-white rounded-2xl shadow-lg p-8 fade-in';
                
                const categoryName = category.charAt(0).toUpperCase() + category.slice(1);
                const categoryIcon = categoryIcons[category] || '';
                
                categorySection.innerHTML = `
                    <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        ${categoryIcon}
                        <span>Top 10 - ${categoryName}</span>
                    </h3>
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Posizione</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Repository</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Punteggio</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            ${sortedByCategory.map((report, index) => {
                                const score = report.punteggi[category];
                                const scoreClass = getScoreColorClass(score);
                                const reportData = encodeURIComponent(JSON.stringify(report, null, 2));
                                
                                return `
                                <tr class="hover:bg-gray-50 cursor-pointer" onclick="populatePage(allReports[${allReports.indexOf(report)}]); window.scrollTo({top: 0, behavior: 'smooth'});">
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="inline-flex items-center justify-center px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                            ${index + 1}
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <div class="text-sm font-medium text-gray-900">${report.nome_repository}</div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-sm font-medium ${scoreClass}">
                                            ${score.toFixed(2)}/10
                                        </span>
                                    </td>
                                </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
                
                categoryRankingsContainer.appendChild(categorySection);
            });
            
            // Initialize tooltips for any new elements
            tippy('[data-tippy-content]', {
                theme: 'light',
                placement: 'top',
                arrow: true
            });
        }
        
        // Add function to download a specific report
        function downloadSpecificReport(encodedData, repoName) {
            try {
                const reportData = JSON.parse(decodeURIComponent(encodedData));
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(reportData, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `${repoName}_report.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            } catch (error) {
                console.error('Error downloading report:', error);
                alert('Si è verificato un errore durante il download del report.');
            }
        }
        window.downloadSpecificReport = downloadSpecificReport;

        function getScoreColorClass(score) {
            if (score >= 7) return 'bg-green-100 text-green-800';
            if (score >= 4) return 'bg-yellow-100 text-yellow-800';
            return 'bg-red-100 text-red-800';
        }

        function downloadJSON(reportData, reportName) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(reportData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `${reportName}_report.json`);  // Dynamic report name
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
        window.downloadJSON = downloadJSON;

        document.addEventListener('DOMContentLoaded', () => {
            loadLatestReports(); // Load and process all the latest reports.

            tippy('[data-tippy-content]', {
                theme: 'light',
                placement: 'top',
                arrow: true
            });
        });
    </script>
    <footer>
        <div class="flex justify-center gap-4">
            <a href="https://github.com/fabriziosalmi/repolizer" id="repo-url" aria-label="Visualizza il repository su GitHub" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition-colors duration-200 ease-in-out gap-2">
