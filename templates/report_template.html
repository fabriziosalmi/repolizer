<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repolizer Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .metric-card { transition: all 0.3s ease; }
        .metric-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .chart-container { 
            position: relative; 
            margin: auto; 
            height: 300px; 
            width: 100%; 
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .categories-title-fixed {
            font-size: 1.2rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Header -->
        <header class="text-center mb-16 fade-in">
            <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl md:text-6xl mb-4">{{repo_name}}</h1>
            <p class="text-lg text-gray-600 mb-8">Report generato il {{data_analisi}}</p>
            <a href="{{repo_url}}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 transition-colors duration-200 ease-in-out gap-2">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                Visualizza su GitHub
            </a>
        </header>

        <!-- Punteggio Totale -->
        <div class="mb-16 fade-in">
            <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
                <h3 class="text-2xl font-semibold mb-6">Punteggio Totale</h3>
                <div class="text-6xl font-bold {% if punteggio_totale >= 7 %}text-green-600{% elif punteggio_totale >= 4 %}text-yellow-600{% else %}text-red-600{% endif %} mb-6">
                    {{punteggio_totale}}<span class="text-3xl text-gray-400">/10</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div class="bg-indigo-600 h-3 rounded-full transition-all duration-1000 ease-out" style="width: {{report_data.punteggio_totale_percentuale}}%"></div>
                </div>
            </div>
        </div>

        <!-- Grafici Principali -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
            <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
                <h4 class="text-xl font-semibold mb-6">Punteggi per Categoria</h4>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
                <h4 class="text-xl font-semibold mb-6">Andamento Storico</h4>
                <div class="chart-container">
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Dettagli per Categoria -->
        <div id="categoryDetails" class="space-y-8">
            <template id="categoryTemplate">
                <div class="bg-white rounded-2xl shadow-lg overflow-hidden fade-in">
                    <button class="w-full px-8 py-4 text-left bg-gray-50 hover:bg-gray-100 transition-colors duration-200 flex justify-between items-center cursor-pointer">
                        <h3 class="text-2xl font-semibold category-name categories-title-fixed"></h3>
                        <svg class="w-6 h-6 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div class="category-content hidden">
                        <div class="p-8">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead>
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Parametro</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Valore</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Punteggio</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descrizione</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200 parameters-list"></tbody>
                            </table>
                            
                            <!-- Suggestions section for each category -->
                            <div class="mt-6 category-suggestions">
                                <h4 class="text-lg font-medium text-gray-800 mb-3">Suggerimenti</h4>
                                <ul class="space-y-2 suggestions-list">
                                    <!-- Suggestions will be populated here -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
        <br>
        <!-- Removing the "Tutti i Suggerimenti" section as it's redundant now -->
    </div>

    <script>
        const reportData = {{report_data|tojson}};

        function initCharts() {
            Chart.defaults.font.family = '"Inter", sans-serif';
            Chart.defaults.color = '#4B5563';

            const ctxCategory = document.getElementById('categoryChart').getContext('2d');
            
            // Create color array based on score ranges
            const getBarColor = (score) => {
                if (score >= 7) return 'rgba(34, 197, 94, 0.8)';      // Green for good scores
                if (score >= 4) return 'rgba(234, 179, 8, 0.8)';       // Yellow for medium scores
                return 'rgba(239, 68, 68, 0.8)';                       // Red for low scores
            };
            
            // Prepare data and colors
            const categoryLabels = Object.keys(reportData.punteggi).map(label => {
                return label.replace(/_/g, ' ')
                           .split(' ')
                           .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                           .join(' ');
            });
            const scores = Object.values(reportData.punteggi);
            const barColors = scores.map(getBarColor);
            
            // Create vertical bar chart
            new Chart(ctxCategory, {
                type: 'bar',
                data: {
                    labels: categoryLabels,
                    datasets: [{
                        label: 'Punteggio',
                        data: scores,
                        backgroundColor: barColors,
                        borderColor: barColors.map(color => color.replace('0.8', '1')),
                        borderWidth: 1,
                        borderRadius: 6,
                        maxBarThickness: 60
                    }]
                },
                options: {
                    indexAxis: 'y',  // Makes bars horizontal
                    scales: { 
                        x: { 
                            beginAtZero: true, 
                            max: 10,
                            grid: {
                                display: true,
                                drawBorder: false,
                                color: 'rgba(226, 232, 240, 0.7)'
                            },
                            ticks: {
                                stepSize: 2
                            }
                        },
                        y: {
                            grid: {
                                display: false,
                                drawBorder: false
                            }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#1F2937',
                            bodyColor: '#1F2937',
                            borderColor: '#E5E7EB',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `Punteggio: ${context.raw.toFixed(2)}/10`;
                                }
                            }
                        }
                    },
                    layout: {
                        padding: {
                            left: 10,
                            right: 20,
                            top: 0,
                            bottom: 0
                        }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });

            if (reportData.storico?.length > 0) {
                const ctxHistory = document.getElementById('historyChart').getContext('2d');
                new Chart(ctxHistory, {
                    type: 'line',
                    data: {
                        labels: reportData.storico.map(entry => entry.data),
                        datasets: [{
                            label: 'Punteggio Totale',
                            data: reportData.storico.map(entry => entry.punteggio_totale),
                            borderColor: 'rgba(79, 70, 229, 1)',
                            backgroundColor: 'rgba(79, 70, 229, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        scales: { y: { beginAtZero: true, max: 10 } },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        }

        function populateCategoryDetails() {
            const container = document.getElementById('categoryDetails');
            const template = document.getElementById('categoryTemplate');
            container.innerHTML = '';

            Object.entries(reportData.dettagli).forEach(([categoria, dettagli]) => {
                const categoryElement = template.content.cloneNode(true);
                const section = categoryElement.querySelector('div');
                
                // Imposta il nome della categoria
                section.querySelector('.category-name').textContent = categoria.replace('_', ' ').toUpperCase();
                
                // Popola la tabella dei parametri
                const parametersList = section.querySelector('.parameters-list');
                Object.entries(dettagli).forEach(([nome, info]) => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50';
                    const parameterName = nome.replace('_', ' ').toUpperCase();
                    const parameterIcon = getParameterIcon(info.tipo || 'default');
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            <div class="flex items-center gap-2" data-tippy-content="${info.descrizione || 'Nessuna descrizione disponibile'}">
                                ${parameterIcon}
                                <span>${parameterName}</span>
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="font-mono bg-gray-100 px-2 py-1 rounded">${info.valore}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${getScoreClass(info.punteggio)}">
                                ${info.punteggio}/10
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">${info.descrizione || '-'}</td>
                    `;
                    parametersList.appendChild(row);
                });
                
                // Aggiungi suggerimenti specifici per questa categoria
                const suggestionsList = section.querySelector('.suggestions-list');
                const categorySuggestions = reportData.suggerimenti[categoria] || [];
                
                if (categorySuggestions.length > 0) {
                    categorySuggestions.forEach(suggestion => {
                        const li = document.createElement('li');
                        li.className = 'p-3 border-l-4 border-indigo-500 bg-indigo-50 rounded-r-lg';
                        li.innerHTML = `<p class="text-gray-700">${suggestion}</p>`;
                        suggestionsList.appendChild(li);
                    });
                } else {
                    // Se non ci sono suggerimenti
                    const li = document.createElement('li');
                    li.className = 'p-3 bg-gray-50 rounded-lg text-gray-500 italic';
                    li.textContent = 'Nessun suggerimento per questa categoria';
                    suggestionsList.appendChild(li);
                }
                
                // Aggiungi la funzionalità di collasso
                const toggleButton = section.querySelector('button');
                const content = section.querySelector('.category-content');
                const arrow = toggleButton.querySelector('svg');
                
                toggleButton.addEventListener('click', () => {
                    const isHidden = content.classList.contains('hidden');
                    content.classList.toggle('hidden');
                    arrow.style.transform = isHidden ? 'rotate(180deg)' : '';
                });
                
                container.appendChild(section);
            });
        }

        // Removing the populateSuggestions function as it's no longer needed
        // Also remove its call from the DOMContentLoaded event listener

        function getParameterIcon(tipo) {
            const icons = {
                'performance': '<svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
                'security': '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>',
                'code_quality': '<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>',
                'default': '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>'
            };
            return icons[tipo] || icons.default;
        }

        function getScoreClass(punteggio) {
            if (punteggio >= 7) return 'bg-green-100 text-green-800';
            if (punteggio >= 4) return 'bg-yellow-100 text-yellow-800';
            if (punteggio > 0) return 'bg-red-100 text-red-800';
            return 'bg-gray-100 text-gray-800'; // Score 0 = Not analyzed/unavailable
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            populateCategoryDetails();
            // Removing populateSuggestions() call
            tippy('[data-tippy-content]', {
                theme: 'light',
                placement: 'top',
                arrow: true
            });
        });
    </script>
</body>
</html>
